<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locate Me Now</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e53935" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LocateMe" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: #1a1a1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      color: #1a1a1a;
    }

    p.subtitle {
      margin: 0 0 28px 0;
      font-size: 14px;
      color: #666;
    }

    /* Contact block wraps each email field + label */
    .contact-block {
      margin-bottom: 12px;
      text-align: left;
    }

    .field-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    textarea {
      height: 90px;
      resize: none;
      margin-top: 12px;
    }

    /* The "+ Add contact" button */
    #add-contact-btn {
      background: none;
      border: 1px dashed #ccc;
      color: #e53935;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    #add-contact-btn:hover {
      background-color: #fff5f5;
    }

    /* Hidden contact fields start invisible */
    .contact-block.hidden {
      display: none;
    }

    /* Saved notice under contact fields */
    .saved-notice {
      font-size: 11px;
      color: #2e7d32;
      margin-top: 2px;
      min-height: 14px;
    }

    #help-button {
      width: 100%;
      padding: 22px;
      background-color: #e53935;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    #help-button:hover {
      background-color: #c62828;
    }

    #help-button.counting {
      background-color: #e65100;
      font-size: 24px;
      letter-spacing: 2px;
    }

    #help-button:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    #cancel-button {
      display: none;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background-color: transparent;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #cancel-button:hover {
      background-color: #f5f5f5;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
      color: #333;
    }

    .success { color: #2e7d32; font-weight: bold; }
    .error   { color: #c62828; font-weight: bold; }
    .info    { color: #555; }

  </style>
</head>
<body>

  <div class="card">
    <h1>🚨 Locate Me Now</h1>
    <p class="subtitle">Press the button to send your location to your emergency contacts.</p>

    <!-- Contact 1 — always visible -->
    <div class="contact-block" id="block-1">
      <div class="field-label">Emergency contact 1</div>
      <input type="email" id="email-1" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-1"></div>
    </div>

    <!-- Contact 2 — hidden until + button clicked -->
    <div class="contact-block hidden" id="block-2">
      <div class="field-label">Emergency contact 2</div>
      <input type="email" id="email-2" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-2"></div>
    </div>

    <!-- Contact 3 — hidden until + button clicked twice -->
    <div class="contact-block hidden" id="block-3">
      <div class="field-label">Emergency contact 3</div>
      <input type="email" id="email-3" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-3"></div>
    </div>

    <!-- Add contact button -->
    <button id="add-contact-btn">+ Add contact</button>

    <!-- Optional message -->
    <div class="field-label" style="text-align:left">Optional message</div>
    <textarea id="custom-message" placeholder="e.g. I need help, call me"></textarea>

    <button id="help-button">HELP</button>
    <button id="cancel-button">Cancel</button>

    <div id="status"></div>
  </div>

  <script>

    // ---- SETUP ----
    emailjs.init("aZEr1eChgvhy5PCAh");
    var countdownTimer = null;

    // ---- LOAD SAVED EMAILS ----
    // Check localStorage for each contact slot
    for (var i = 1; i <= 3; i++) {
      var saved = localStorage.getItem("emergencyContact" + i);
      if (saved) {
        document.getElementById("email-" + i).value = saved;
        document.getElementById("notice-" + i).textContent = "✔ Saved from last time";
        // If contact 2 or 3 has a saved email, show that block automatically
        if (i > 1) {
          document.getElementById("block-" + i).classList.remove("hidden");
        }
      }
    }

    // ---- TRACK HOW MANY CONTACTS ARE VISIBLE ----
    // Start at 1 (first block always visible)
    // But if saved emails revealed block 2 or 3, count those too
    var visibleContacts = 1;
    if (!document.getElementById("block-2").classList.contains("hidden")) visibleContacts = 2;
    if (!document.getElementById("block-3").classList.contains("hidden")) visibleContacts = 3;

    // Hide the + button if all 3 are already visible
    if (visibleContacts === 3) {
      document.getElementById("add-contact-btn").style.display = "none";
    }

    // ---- ADD CONTACT BUTTON ----
    document.getElementById("add-contact-btn").addEventListener("click", function() {
      visibleContacts++;
      // Show the next contact block
      document.getElementById("block-" + visibleContacts).classList.remove("hidden");
      // Focus the new field so keyboard opens on mobile
      document.getElementById("email-" + visibleContacts).focus();
      // Hide the + button once all 3 are visible
      if (visibleContacts === 3) {
        document.getElementById("add-contact-btn").style.display = "none";
      }
    });

    // ---- CANCEL BUTTON ----
    var helpBtn   = document.getElementById("help-button");
    var cancelBtn = document.getElementById("cancel-button");

    cancelBtn.addEventListener("click", function() {
      clearTimeout(countdownTimer);
      helpBtn.textContent     = "HELP";
      helpBtn.className       = "";
      helpBtn.disabled        = false;
      cancelBtn.style.display = "none";
      showStatus("Cancelled. You're safe.", "info");
    });

    // ---- HELP BUTTON ----
    helpBtn.addEventListener("click", function() {

      // Collect all filled email addresses
      var contacts = [];
      for (var i = 1; i <= 3; i++) {
        var val = document.getElementById("email-" + i).value.trim();
        if (val) contacts.push(val);
      }

      // Make sure at least one contact is entered
      if (contacts.length === 0) {
        showStatus("Please enter at least one emergency contact email.", "error");
        return;
      }

      var customMessage = document.getElementById("custom-message").value || "No message provided";

      // Save all contacts to localStorage
      for (var j = 1; j <= 3; j++) {
        var email = document.getElementById("email-" + j).value.trim();
        if (email) {
          localStorage.setItem("emergencyContact" + j, email);
          document.getElementById("notice-" + j).textContent = "✔ Saved for next time";
        }
      }

      // ---- COUNTDOWN ----
      var count = 3;
      cancelBtn.style.display = "block";
      helpBtn.className       = "counting";
      helpBtn.disabled        = false;

      function tick() {
        if (count === 0) {
          helpBtn.textContent     = "SENDING...";
          helpBtn.disabled        = true;
          cancelBtn.style.display = "none";
          sendAlert(contacts, customMessage);
        } else {
          helpBtn.textContent = "Sending in " + count + "...";
          count--;
          countdownTimer = setTimeout(tick, 1000);
        }
      }

      tick();
    });

    // ---- SEND ALERT TO ALL CONTACTS ----
    function sendAlert(contacts, customMessage) {
      showStatus("Getting your location...", "info");

      navigator.geolocation.getCurrentPosition(

        function(position) {
          var lat     = position.coords.latitude;
          var lon     = position.coords.longitude;
          var mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

          // Send email to each contact one by one
          // Promise.all means "wait for ALL emails to finish"
          var emailPromises = contacts.map(function(email) {
            return emailjs.send(
              "service_1fzochs",
              "template_2hh3ecn",
              {
                to_email      : email,
                message       : customMessage,
                location_link : mapLink
              }
            );
          });

          // Wait for all emails to be sent
          Promise.all(emailPromises).then(function() {
            helpBtn.textContent = "HELP";
            helpBtn.className   = "";
            helpBtn.disabled    = false;
            showStatus("✅ Alert sent to " + contacts.length + " contact(s)! They have your location.", "success");

          }).catch(function(error) {
            helpBtn.textContent = "HELP";
            helpBtn.className   = "";
            helpBtn.disabled    = false;
            showStatus("❌ Failed to send. Check your internet connection.", "error");
            console.error("EmailJS error:", error);
          });
        },

        function() {
          helpBtn.textContent = "HELP";
          helpBtn.className   = "";
          helpBtn.disabled    = false;
          showStatus("❌ Could not get your location. Please allow location access.", "error");
        }
      );
    }

    // ---- HELPER ----
    function showStatus(message, type) {
      var el         = document.getElementById("status");
      el.textContent = message;
      el.className   = type;
    }

    // ---- SERVICE WORKER ----
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Locate-me-now/sw.js");
    }

  </script>

</body>
</html>
