<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locate Me Now</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e53935" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LocateMe" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background-color: #1a1a1a;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      color: #1a1a1a;
    }

    p.subtitle {
      margin: 0 0 28px 0;
      font-size: 14px;
      color: #666;
    }

    .contact-block {
      margin-bottom: 12px;
      text-align: left;
    }

    .field-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    textarea {
      height: 90px;
      resize: none;
      margin-top: 12px;
    }

    #add-contact-btn {
      background: none;
      border: 1px dashed #ccc;
      color: #e53935;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    #add-contact-btn:hover { background-color: #fff5f5; }

    .contact-block.hidden { display: none; }

    .saved-notice {
      font-size: 11px;
      color: #2e7d32;
      margin-top: 2px;
      min-height: 14px;
    }

    /* HELP button */
    #help-button {
      width: 100%;
      padding: 22px;
      background-color: #e53935;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    #help-button:hover { background-color: #c62828; }

    #help-button.counting {
      background-color: #e65100;
      font-size: 24px;
      letter-spacing: 2px;
    }

    #help-button:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    /* Panic Mode button */
    #panic-button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background-color: transparent;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    #panic-button:hover {
      background-color: #f5f5f5;
    }

    /* When panic mode is ON, button turns green */
    #panic-button.active {
      background-color: #2e7d32;
      color: white;
      border-color: #2e7d32;
    }

    /* Panic mode status bar — only shows when active */
    #panic-status {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background-color: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      font-size: 13px;
      color: #5d4037;
    }

    #cancel-button {
      display: none;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background-color: transparent;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    #cancel-button:hover { background-color: #f5f5f5; }

    #status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
      color: #333;
    }

    .success { color: #2e7d32; font-weight: bold; }
    .error   { color: #c62828; font-weight: bold; }
    .info    { color: #555; }

  </style>
</head>
<body>

  <div class="card">
    <h1>🚨 Locate Me Now</h1>
    <p class="subtitle">Press the button to send your location to your emergency contacts.</p>

    <div class="contact-block" id="block-1">
      <div class="field-label">Emergency contact 1</div>
      <input type="email" id="email-1" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-1"></div>
    </div>

    <div class="contact-block hidden" id="block-2">
      <div class="field-label">Emergency contact 2</div>
      <input type="email" id="email-2" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-2"></div>
    </div>

    <div class="contact-block hidden" id="block-3">
      <div class="field-label">Emergency contact 3</div>
      <input type="email" id="email-3" placeholder="example@gmail.com" />
      <div class="saved-notice" id="notice-3"></div>
    </div>

    <button id="add-contact-btn">+ Add contact</button>

    <div class="field-label" style="text-align:left">Optional message</div>
    <textarea id="custom-message" placeholder="e.g. I need help, call me"></textarea>

    <button id="help-button">HELP</button>

    <!-- Panic Mode button -->
    <button id="panic-button">🔴 Activate Panic Mode</button>

    <!-- Shows when panic mode is running -->
    <div id="panic-status"></div>

    <button id="cancel-button">Cancel</button>

    <div id="status"></div>
  </div>

  <script>

    // ---- SETUP ----
    emailjs.init("aZEr1eChgvhy5PCAh");
    var countdownTimer  = null;
    var panicInterval   = null;  // This holds the panic mode repeating timer
    var panicActive     = false; // Tracks if panic mode is on or off
    var panicCount      = 0;     // Counts how many alerts have been sent

    // ---- LOAD SAVED EMAILS ----
    for (var i = 1; i <= 3; i++) {
      var saved = localStorage.getItem("emergencyContact" + i);
      if (saved) {
        document.getElementById("email-" + i).value = saved;
        document.getElementById("notice-" + i).textContent = "✔ Saved from last time";
        if (i > 1) {
          document.getElementById("block-" + i).classList.remove("hidden");
        }
      }
    }

    var visibleContacts = 1;
    if (!document.getElementById("block-2").classList.contains("hidden")) visibleContacts = 2;
    if (!document.getElementById("block-3").classList.contains("hidden")) visibleContacts = 3;
    if (visibleContacts === 3) {
      document.getElementById("add-contact-btn").style.display = "none";
    }

    // ---- ADD CONTACT BUTTON ----
    document.getElementById("add-contact-btn").addEventListener("click", function() {
      visibleContacts++;
      document.getElementById("block-" + visibleContacts).classList.remove("hidden");
      document.getElementById("email-" + visibleContacts).focus();
      if (visibleContacts === 3) {
        document.getElementById("add-contact-btn").style.display = "none";
      }
    });

    // ---- CANCEL BUTTON ----
    var helpBtn    = document.getElementById("help-button");
    var cancelBtn  = document.getElementById("cancel-button");
    var panicBtn   = document.getElementById("panic-button");
    var panicPanel = document.getElementById("panic-status");

    cancelBtn.addEventListener("click", function() {
      clearTimeout(countdownTimer);
      helpBtn.textContent     = "HELP";
      helpBtn.className       = "";
      helpBtn.disabled        = false;
      cancelBtn.style.display = "none";
      showStatus("Cancelled. You're safe.", "info");
    });

    // ---- PANIC MODE BUTTON ----
    panicBtn.addEventListener("click", function() {

      // If panic mode is already on, turn it OFF
      if (panicActive) {
        stopPanicMode();
        return;
      }

      // Make sure there's at least one contact
      var contacts = getContacts();
      if (contacts.length === 0) {
        showStatus("Please enter at least one emergency contact email.", "error");
        return;
      }

      // Turn panic mode ON
      startPanicMode(contacts);
    });

    // ---- START PANIC MODE ----
    function startPanicMode(contacts) {
      panicActive = true;
      panicCount  = 0;
      var customMessage = document.getElementById("custom-message").value || "PANIC MODE ACTIVE";

      // Update button appearance
      panicBtn.textContent = "🟢 Panic Mode ON — tap to stop";
      panicBtn.classList.add("active");

      // Show the panic status panel
      panicPanel.style.display = "block";
      panicPanel.textContent   = "🚨 Panic mode active — sending location now...";

      // Flash the page title so user knows it's running
      // This alternates the tab title between two states
      var titleFlash = setInterval(function() {
        document.title = document.title === "🚨 PANIC MODE" ? "Locate Me Now" : "🚨 PANIC MODE";
      }, 1000);

      // Store the title flash interval so we can stop it later
      window.titleFlashInterval = titleFlash;

      // Send the first alert immediately
      sendPanicAlert(contacts, customMessage);

      // Then send every 2 minutes (120000 milliseconds = 2 minutes)
      // setInterval means "repeat this every X milliseconds forever"
      panicInterval = setInterval(function() {
        sendPanicAlert(contacts, customMessage);
      }, 120000);
    }

    // ---- STOP PANIC MODE ----
    function stopPanicMode() {
      panicActive = false;

      // Stop the repeating timer
      clearInterval(panicInterval);

      // Stop the title flashing
      clearInterval(window.titleFlashInterval);

      // Reset everything
      document.title           = "Locate Me Now";
      panicBtn.textContent     = "🔴 Activate Panic Mode";
      panicBtn.classList.remove("active");
      panicPanel.style.display = "none";

      showStatus("Panic mode stopped. Stay safe. 💙", "info");
    }

    // ---- SEND ONE PANIC ALERT ----
    function sendPanicAlert(contacts, customMessage) {
      panicCount++;

      navigator.geolocation.getCurrentPosition(
        function(position) {
          var lat     = position.coords.latitude;
          var lon     = position.coords.longitude;
          var mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

          // Send to all contacts
          var emailPromises = contacts.map(function(email) {
            return emailjs.send(
              "service_1fzochs",
              "template_2hh3ecn",
              {
                to_email      : email,
                message       : "🚨 PANIC MODE — Alert #" + panicCount + ". " + customMessage,
                location_link : mapLink
              }
            );
          });

          Promise.all(emailPromises).then(function() {
            panicPanel.textContent = "🚨 Alert #" + panicCount + " sent to " + contacts.length + " contact(s). Next in 2 min.";
          }).catch(function() {
            panicPanel.textContent = "⚠️ Alert #" + panicCount + " failed to send. Will retry in 2 min.";
          });
        },
        function() {
          panicPanel.textContent = "⚠️ Could not get location for alert #" + panicCount + ". Will retry in 2 min.";
        }
      );
    }

    // ---- HELP BUTTON ----
    helpBtn.addEventListener("click", function() {
      var contacts = getContacts();

      if (contacts.length === 0) {
        showStatus("Please enter at least one emergency contact email.", "error");
        return;
      }

      var customMessage = document.getElementById("custom-message").value || "No message provided";

      // Save contacts
      for (var j = 1; j <= 3; j++) {
        var email = document.getElementById("email-" + j).value.trim();
        if (email) {
          localStorage.setItem("emergencyContact" + j, email);
          document.getElementById("notice-" + j).textContent = "✔ Saved for next time";
        }
      }

      // Countdown
      var count = 3;
      cancelBtn.style.display = "block";
      helpBtn.className       = "counting";
      helpBtn.disabled        = false;

      function tick() {
        if (count === 0) {
          helpBtn.textContent     = "SENDING...";
          helpBtn.disabled        = true;
          cancelBtn.style.display = "none";
          sendAlert(contacts, customMessage);
        } else {
          helpBtn.textContent = "Sending in " + count + "...";
          count--;
          countdownTimer = setTimeout(tick, 1000);
        }
      }

      tick();
    });

    // ---- SEND ONE-TIME ALERT ----
    function sendAlert(contacts, customMessage) {
      showStatus("Getting your location...", "info");

      navigator.geolocation.getCurrentPosition(
        function(position) {
          var lat     = position.coords.latitude;
          var lon     = position.coords.longitude;
          var mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;

          var emailPromises = contacts.map(function(email) {
            return emailjs.send(
              "service_1fzochs",
              "template_2hh3ecn",
              {
                to_email      : email,
                message       : customMessage,
                location_link : mapLink
              }
            );
          });

          Promise.all(emailPromises).then(function() {
            helpBtn.textContent = "HELP";
            helpBtn.className   = "";
            helpBtn.disabled    = false;
            showStatus("✅ Alert sent to " + contacts.length + " contact(s)! They have your location.", "success");
          }).catch(function(error) {
            helpBtn.textContent = "HELP";
            helpBtn.className   = "";
            helpBtn.disabled    = false;
            showStatus("❌ Failed to send. Check your internet connection.", "error");
            console.error("EmailJS error:", error);
          });
        },
        function() {
          helpBtn.textContent = "HELP";
          helpBtn.className   = "";
          helpBtn.disabled    = false;
          showStatus("❌ Could not get your location. Please allow location access.", "error");
        }
      );
    }

    // ---- HELPER: GET ALL FILLED CONTACTS ----
    // Reusable function that collects all non-empty email fields
    function getContacts() {
      var contacts = [];
      for (var i = 1; i <= 3; i++) {
        var val = document.getElementById("email-" + i).value.trim();
        if (val) contacts.push(val);
      }
      return contacts;
    }

    // ---- HELPER: SHOW STATUS ----
    function showStatus(message, type) {
      var el         = document.getElementById("status");
      el.textContent = message;
      el.className   = type;
    }

    // ---- SERVICE WORKER ----
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/Locate-me-now/sw.js");
    }

  </script>

</body>
</html>
